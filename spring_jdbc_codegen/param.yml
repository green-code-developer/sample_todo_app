
# JDBC 接続情報（必須）
jdbcUrl: jdbc:postgresql://localhost:56432/todo
jdbcUser: todo
jdbcPass: todo
jdbcSchema: todo

# Entity のパッケージ名（必須）
entityPackage: jp.green_code.todo.domain.entity

# Repository のパッケージ名（必須）
repositoryPackage: jp.green_code.todo.domain.repository

# Java 最上位フォルダ（必須）
mainJavaDir: ../src/main/java

# Java Test 最上位フォルダ（テスト作成時必須）
testJavaDir: ../src/test/java

# 対象外テーブル（省略可）
#   記載のテーブルに対してはEntity, Repository, TestRepository のいずれも作成しない
excludedTableNames:
  - spring_session
  - spring_session_attributes

# Enum 型登録（省略可）
#   DBの型とJava (enum) の型を下の形式で指定します
#   status_enum: jp.green_code.demo.enum.StatusEnum
enumJavaTypeMappings:
  todo_status: jp.green_code.todo.domain.enums.TodoStatusEnum

# UPDATE 対象外カラム（省略可）
#   テーブル名とカラム名を下の形式で指定します
#   table_name:
#     - column_name
#   テーブルに* を指定すると全テーブルのカラムが対象となります
excludeUpdateColumnsByTable:
  "*":
    - created_at
    - created_by

# now() 更新カラム（省略可）
#   insert やupdate の時に、sql のnow() をセットします
#   java から値を指定することはできなくなります。
#   テーブル名とカラム名を下の形式で指定します
#   table_name:
#     - column_name
#   テーブルに* を指定すると全テーブルのカラムが対象となります
setNowColumnsByTable:
  "*":
    - updated_at
    - created_at

# 実体クラスの強制上書き（省略可）
#   初期値 false(しない)
#forceOverwriteImplementation: false

# Entity パッケージに @NullUnmarked を付けるかどうか（省略可）
#   初期値 false(付けない)
#   付ける場合{entityPackage} と{entityPackage}.{basePackageName} にpackage-info.java を作成します。また、必要な箇所に @Nullable を追加します。
enableNullUnmarkedForEntityPackages: true

# テスト対象テーブル（省略可）
#   指定されたテーブルのcrud テストコードを作成します
#   テーブルにPK がない場合はテストは作成されません
testTargetTable:
  - account
  - todo

#
# 以下、高度な設定
#

# 基底クラスのパッケージ名（省略可）
#   初期値 base
#basePackageName: base

# Entity クラスの接頭辞（省略可）
#   初期値 空文字列
#entityClassNamePrefix: ""

# Entity クラスの接尾辞（省略可）
#   初期値 空文字列
#entityClassNameSuffix: Entity

# Repository クラスの接頭辞（省略可）
#   初期値 空文字列
#repositoryClassNamePrefix: ""

# Repository クラスの接尾辞（省略可）
#   初期値 Repository
#repositoryClassNameSuffix: Repository

# TestRepository クラスの接頭辞（省略可）
#   初期値 Test
#testRepositoryClassNamePrefix: Test

# TestRepository クラスの接尾辞（省略可）
#   初期値 空文字列
#testRepositoryClassNameSuffix:

# ヘルパークラス名（省略可）
#   初期値 RepositoryHelper
#repositoryHelperClassName: RepositoryHelper

# カラム定義クラス名（省略可）
#   初期値 ColumnDefinition
#columnDefinitionClassName: ColumnDefinition

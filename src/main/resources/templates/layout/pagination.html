<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<th:block th:fragment="pagination(page)" th:remove="tag">
    <div th:replace="~{layout/pagination::paginationCore(${page}, 'main')}"></div>
</th:block>

<th:block th:fragment="paginationCore(page, key)" th:remove="tag">
    <!--/*
      ページング
        最初と最後と現在のページの前後2ページを選択可能とする
        総ページ数が1の場合は何も表示しない

      引数
        page　は PageResult のインスタンス。現在ページとデータ数等を持つ
        key ページングの識別子。あまり使わない。1ページに複数箇所のページングを表示する場合に使い分ける

      全9ページの場合の表示例
        現在1ページ  1 2 3 ... 9
        現在2ページ  1 2 3 4 ... 9
        現在3ページ  1 2 3 4 5 ... 9
        現在4ページ  1 2 3 4 5 6 ... 9
        現在5ページ  1 ... 3 4 5 6 7 ... 9
        現在6ページ  1 ... 4 5 6 7 8 9
        現在7ページ  1 ... 5 6 7 8 9
        現在8ページ  1 ... 6 7 8 9
        現在9ページ  1 ... 7 8 9
    */-->
    <th:block th:if="${page != null && 1 < page.totalPage}">
        <nav class="pagination is-small" th:data-pagination-key="${key}">
            <ul class="pagination-list">
                <!--/* 前後表示の低い方が2以上の場合は1ページ目を表示 */-->
                <th:block th:if="1 < ${page.lower}">
                    <li><span class="pagination-link">1</span></li>
                </th:block>
                <!--/* 前後表示の低い方が3以上なら...を表示 */-->
                <th:block th:if="2 < ${page.lower}">
                    <li><span class="pagination-ellipsis">&hellip;</span></li>
                </th:block>
                <!--/* 前後表示 */-->
                <th:block th:if="0 < ${page.upper}">
                    <th:block th:each="i : ${#numbers.sequence(page.lower, page.upper)}">
                        <li><span class="pagination-link" th:text="${i}"
                                  th:classappend="${i == page.currentPage} ? is-current">5</span>
                        </li>
                    </th:block>
                </th:block>
                <!--/* 前後表示の高い方が総ページ数-2以下なら...を表示 */-->
                <th:block th:if="${page.upper} < ${page.totalPage - 1}">
                    <li><span class="pagination-ellipsis">&hellip;</span></li>
                </th:block>
                <!--/* 前後表示の高い方が総ページ数より小さい場合は最終ページ(=総ページ数)を表示 */-->
                <th:block th:if="${page.upper} < ${page.totalPage}">
                    <li><span class="pagination-link" th:text="${page.totalPage}">9</span></li>
                </th:block>
            </ul>
        </nav>
    </th:block>
</th:block>

<!--/* 1ページ表示件数の候補 */-->
<th:block th:fragment="pageOption(currentValue)" th:remove="tag">
    <option th:value="1">1</option>
    <option th:value="10">10</option>
    <option th:value="50">50</option>
    <option th:value="100">100</option>
    <option th:value="500">500</option>
</th:block>
</html>
